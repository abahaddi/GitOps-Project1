apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: voting-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/abahaddi/GitOps-Project1.git
    targetRevision: main
    path: .

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
